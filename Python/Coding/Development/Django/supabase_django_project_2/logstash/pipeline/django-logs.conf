input {
  # Specific input for request logs
  file {
    path => "/logs/request_logs/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "request-logs"
  }
  
  # Specific input for error logs
  file {
    path => "/logs/error_logs/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "error-logs"
  }
  
  # TCP input for direct log shipping (optional)
  tcp {
    port => 5000
    codec => json
  }
}

filter {
  if [type] == "request-logs" {
    grok {
      # Adjust this pattern to match your request logs format
      match => { "message" => "\[%{TIMESTAMP_ISO8601:timestamp}\] %{GREEDYDATA:request_details}" }
    }
    
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
    
    # Try to parse JSON content in request logs
    if [request_details] =~ /^\{.*\}$/ {
      json {
        source => "request_details"
        target => "request_data"
      }
    }
    
    # Add metadata
    mutate {
      add_field => { 
        "log_type" => "request"
        "application" => "your_app_name"
      }
    }
  }
  
  else if [type] == "error-logs" {
    grok {
      # Adjust this pattern to match your error logs format
      match => { "message" => "\[%{TIMESTAMP_ISO8601:timestamp}\] %{LOGLEVEL:log_level} %{GREEDYDATA:error_message}" }
    }
    
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
    
    # Try to parse JSON content in error logs
    if [error_message] =~ /^\{.*\}$/ {
      json {
        source => "error_message"
        target => "error_data"
      }
    }
    
    # Parse stack traces if they exist
    if [error_message] =~ /Traceback/ {
      grok {
        match => { "error_message" => "(?m)Traceback%{GREEDYDATA:stack_trace}" }
      }
    }
    
    # Add metadata
    mutate {
      add_field => { 
        "log_type" => "error"
        "application" => "your_app_name" 
      }
    }
  }
}

output {
  if [type] == "request-logs" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "request-logs-%{+YYYY.MM.dd}"
      document_type => "_doc"
    }
  }
  
  else if [type] == "error-logs" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "error-logs-%{+YYYY.MM.dd}"
      document_type => "_doc"
    }
  }
  
  # Output to stdout for debugging
  stdout {
    codec => rubydebug
  }
}